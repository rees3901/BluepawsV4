; BluepawsV4 — Unified Cat Tracker Firmware
; Collar (nRF52840) + Home Hub (ESP32-S3)
; Shared protocol library in shared/lib/

[platformio]
default_envs = collar, hub

; ─────────────────────────────────────────────
; Collar: Seeed XIAO nRF52840 + SX1262 + GNSS + NB-IoT
; ─────────────────────────────────────────────
[env:collar]
platform = nordicnrf52
board = xiao_ble_sense
framework = arduino
lib_extra_dirs = shared/lib
src_dir = collar/src
include_dir = collar/include
build_flags = -DUSE_FREERTOS=1
monitor_speed = 115200
lib_deps =
    jgromes/RadioLib@^7.1.2
    mikalhart/TinyGPSPlus@^1.1.0

; ─────────────────────────────────────────────
; Home Hub: Seeed XIAO ESP32-S3 + SX1262 + WiFi + BLE
; ─────────────────────────────────────────────
[env:hub]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
lib_extra_dirs = shared/lib
src_dir = hub/src
include_dir = hub/include
board_build.filesystem = littlefs
build_flags = -DUSE_FREERTOS=1
monitor_speed = 115200
lib_deps =
    jgromes/RadioLib@^7.1.2
