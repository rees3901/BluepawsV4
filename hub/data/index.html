<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluepaws V4</title>

    <!-- Leaflet CSS — mapping library (loaded from CDN) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">

    <!-- Our custom styles (served from hub's LittleFS flash) -->
    <link rel="stylesheet" href="style.css">

    <!-- Safety net: ensure modals stay hidden even if CSS fails to load -->
    <style>.modal.hidden { display: none; }</style>
</head>
<body>
    <!--
      Page Layout:
        - Hamburger button (fixed, top-left) — toggles sidebar
        - Status banner (fixed, top-right) — shows SSE connection state
        - Sidebar panel (left, collapsible) — device cards + controls
        - Map container (fills remaining space) — Leaflet.js map
        - 3 modals: Settings, Command, Find (hidden by default)
    -->

    <!-- Hamburger Toggle (always visible, moves right when sidebar opens) -->
    <button id="btnHamburger" class="hamburger-btn" title="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <rect x="2" y="4" width="16" height="2" rx="1"/>
            <rect x="2" y="9" width="16" height="2" rx="1"/>
            <rect x="2" y="14" width="16" height="2" rx="1"/>
        </svg>
    </button>

    <!-- Sidebar Panel — contains device cards and header controls -->
    <div id="panel" class="open">
        <div id="panelHeader">
            <span class="panel-title">Bluepaws V4</span>
            <div class="panel-header-btns">
                <span id="statusBanner" class="disconnected">
                    <span id="statusIcon">&#9679;</span>
                    <span id="statusText">Connecting...</span>
                </span>
                <button id="btnSettings" class="ctrl-btn" title="Settings">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 4.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7zM6.5 8a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0z"/>
                        <path d="M9.4.2l.9 1.7c.2.1.4.2.6.3l1.9-.3.8 1.4-1 1.4v.6l1 1.4-.8 1.4-1.9-.3c-.2.1-.4.3-.6.3L9.4 15.8H7.6l-.9-1.7c-.2-.1-.4-.2-.6-.3l-1.9.3-.8-1.4 1-1.4c0-.2 0-.4 0-.6l-1-1.4.8-1.4 1.9.3c.2-.1.4-.3.6-.3L7.6.2h1.8z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Device Cards — dynamically populated by app.js -->
        <div id="deviceCards"></div>
    </div>

    <!-- Map Container — Leaflet.js renders here -->
    <div id="map"></div>

    <!-- Settings Modal — WiFi/cloud config + hub diagnostics -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <h2>Hub Settings</h2>
            <div class="form-group">
                <label>WiFi SSID</label>
                <input type="text" id="cfgSSID" placeholder="Home network name">
            </div>
            <div class="form-group">
                <label>WiFi Password</label>
                <input type="password" id="cfgPass" placeholder="Password">
            </div>
            <div class="form-group">
                <label>Cloud Endpoint</label>
                <input type="url" id="cfgCloud" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Hub Status</label>
                <div id="hubStatus" class="status-info">Loading...</div>
            </div>
            <div class="modal-actions">
                <button id="btnSaveConfig" class="btn-primary">Save &amp; Restart</button>
                <button id="btnCloseSettings" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Command Modal — change collar operating mode (Normal/PowerSave/Active/Lost) -->
    <div id="commandModal" class="modal hidden">
        <div class="modal-content">
            <h2>Send Command</h2>
            <p>Device: <strong id="cmdDeviceName"></strong></p>
            <div class="form-group">
                <label>Change Mode</label>
                <select id="cmdMode">
                    <option value="normal">Normal</option>
                    <option value="powersave">PowerSave</option>
                    <option value="active_find">Active Find</option>
                    <option value="emergency_lost">Emergency Lost</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="btnSendCmd" class="btn-primary">Send</button>
                <button id="btnCloseCmd" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Find Modal — "Find My Pet" buzzer pattern + LED flash control -->
    <div id="findModal" class="modal hidden">
        <div class="modal-content">
            <h2>Find Collar</h2>
            <p>Device: <strong id="findDeviceName"></strong></p>
            <div class="form-group">
                <label>Buzzer Pattern</label>
                <select id="findPattern">
                    <option value="chirp">Chirp (3 beeps)</option>
                    <option value="trill">Trill (rising)</option>
                    <option value="siren">Siren (two-tone)</option>
                    <option value="melody_a">Melody A</option>
                    <option value="melody_b">Melody B</option>
                </select>
            </div>
            <div class="form-group">
                <label>LED Flashes</label>
                <select id="findFlash">
                    <option value="3">3 flashes</option>
                    <option value="5" selected>5 flashes</option>
                    <option value="10">10 flashes</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="btnSendFind" class="btn-primary btn-find-send">Find</button>
                <button id="btnCloseFind" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS — mapping library (loaded from CDN, must load before app.js) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <!-- Our app — served from hub's LittleFS flash -->
    <script src="app.js"></script>
</body>
</html>
