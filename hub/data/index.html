<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluepaws V4</title>

    <!-- Leaflet CSS (CDN — will cache locally for offline use later) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">

    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Status Banner -->
    <div id="statusBanner" class="disconnected">
        <span id="statusIcon">&#9679;</span>
        <span id="statusText">Connecting...</span>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Bottom Panel -->
    <div id="panel">
        <!-- Device Cards -->
        <div id="deviceCards"></div>

        <!-- Controls Bar -->
        <div id="controlsBar">
            <button id="btnFitAll" class="ctrl-btn" title="Fit all markers">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M2 2h4V0H0v6h2V2zm12 0h-4V0h6v6h-2V2zM2 14h4v2H0v-6h2v4zm12 0h-4v2h6v-6h-2v4z"/>
                </svg>
            </button>
            <button id="btnMeasure" class="ctrl-btn" title="Measure distance">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M1 8h2v2H1V8zm4 0h2v2H5V8zm4 0h2v2H9V8zm4 0h2v2h-2V8zM0 6h16v4H0V6z" opacity="0.3"/>
                    <path d="M0 7h16v2H0V7z"/>
                </svg>
            </button>
            <div class="spacer"></div>
            <button id="btnSettings" class="ctrl-btn" title="Settings">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 4.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7zM6.5 8a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0z"/>
                    <path d="M9.4.2l.9 1.7c.2.1.4.2.6.3l1.9-.3.8 1.4-1 1.4v.6l1 1.4-.8 1.4-1.9-.3c-.2.1-.4.3-.6.3L9.4 15.8H7.6l-.9-1.7c-.2-.1-.4-.2-.6-.3l-1.9.3-.8-1.4 1-1.4c0-.2 0-.4 0-.6l-1-1.4.8-1.4 1.9.3c.2-.1.4-.3.6-.3L7.6.2h1.8z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <h2>Hub Settings</h2>
            <div class="form-group">
                <label>WiFi SSID</label>
                <input type="text" id="cfgSSID" placeholder="Home network name">
            </div>
            <div class="form-group">
                <label>WiFi Password</label>
                <input type="password" id="cfgPass" placeholder="Password">
            </div>
            <div class="form-group">
                <label>Cloud Endpoint</label>
                <input type="url" id="cfgCloud" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Hub Status</label>
                <div id="hubStatus" class="status-info">Loading...</div>
            </div>
            <div class="modal-actions">
                <button id="btnSaveConfig" class="btn-primary">Save &amp; Restart</button>
                <button id="btnCloseSettings" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Command Modal -->
    <div id="commandModal" class="modal hidden">
        <div class="modal-content">
            <h2>Send Command</h2>
            <p>Device: <strong id="cmdDeviceName"></strong></p>
            <div class="form-group">
                <label>Change Mode</label>
                <select id="cmdMode">
                    <option value="normal">Normal</option>
                    <option value="active">Active</option>
                    <option value="powersave">Power Save</option>
                    <option value="lost">Lost (Emergency)</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="btnSendCmd" class="btn-primary">Send</button>
                <button id="btnCloseCmd" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <script src="/app.js"></script>
</body>
</html>
